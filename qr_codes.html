<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Codes — Spice Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--obsidian:#0D0D0D;--bg:#F8F5F0;--white:#fff;--border:#E8E4DA;--muted:#8A8476;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--obsidian);padding:40px 32px;}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.page-title{font-family:'Playfair Display',serif;font-size:28px;}
.back-btn{text-decoration:none;background:var(--obsidian);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
.qr-card{
  background:var(--white);border-radius:16px;border:1px solid var(--border);
  padding:24px 20px;text-align:center;
}
.qr-img{width:140px;height:140px;margin:0 auto 14px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:40px;}
.qr-table{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.qr-url{font-size:11px;color:var(--muted);word-break:break-all;margin-bottom:14px;}
.qr-status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;display:inline-block;}
.status-available{background:#EAF5F0;color:#27AE60;}
.status-occupied{background:#FEF5E7;color:#E67E22;}
.status-billing{background:#FDEDEC;color:#E74C3C;}
.gen-btn{
  width:100%;margin-top:12px;
  background:var(--obsidian);color:#fff;border:none;
  border-radius:8px;padding:9px 0;font-size:13px;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;
}
.gen-btn:hover{background:#333;}
</style>
</head>
<body>
<div class="page-head">
  <div class="page-title">📦 QR Codes</div>
  <a href="/dashboard/" class="back-btn">← Dashboard</a>
</div>
<div class="qr-grid">
  {% for table in tables %}
  <div class="qr-card">
    <div class="qr-img">
      {% if table.qr_code %}
        <img src="{{ table.qr_code.url }}" style="width:100%;height:100%;border-radius:8px;object-fit:cover;">
      {% else %}
        📲
      {% endif %}
    </div>
    <div class="qr-table">Table {{ table.number }}</div>
    <div class="qr-url">{{ request.scheme }}://{{ request.get_host }}/menu/?table={{ table.number }}</div>
    <span class="qr-status status-{{ table.status }}">{{ table.get_status_display }}</span>
    <form method="post" action="/api/generate-qr/{{ table.number }}/">
      {% csrf_token %}
      <button class="gen-btn" type="submit">Generate QR</button>
    </form>
  </div>
  {% endfor %}
</div>
</body>
</html>
