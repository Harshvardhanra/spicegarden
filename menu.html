<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spice Garden — Table {{ table_number }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --obsidian: #0D0D0D;
  --charcoal: #1A1A1A;
  --surface: #242424;
  --ivory: #F5F0E8;
  --ivory-dim: #C8C2B4;
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-glow: rgba(201,168,76,0.15);
  --stone: #8A8476;
  --cream: #FBF8F3;
  --border: rgba(201,168,76,0.18);
  --green: #4A7C3F;
  --green-bg: rgba(74,124,63,0.12);
  --red: #C0392B;
  --red-bg: rgba(192,57,43,0.12);
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--obsidian);
  min-height:100vh;
  padding-bottom:160px;
}
.header{
  background:var(--obsidian);
  padding:0;
  position:sticky;top:0;z-index:100;
}
.header-main{
  padding:20px 24px 0;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.brand{}
.brand-name{
  font-family:'Playfair Display',serif;
  font-size:26px;font-weight:700;
  color:var(--gold);
  letter-spacing:0.5px;
  line-height:1;
}
.brand-tagline{
  font-size:11px;color:var(--stone);
  letter-spacing:2px;text-transform:uppercase;
  margin-top:5px;
}
.table-chip{
  background:var(--gold-glow);
  border:1px solid var(--border);
  color:var(--gold);
  padding:6px 16px;border-radius:20px;
  font-size:13px;font-weight:500;
  letter-spacing:0.5px;
}
.cat-scroll-wrap{
  overflow-x:auto;scrollbar-width:none;
  padding:16px 24px 18px;
  display:flex;gap:8px;
}
.cat-scroll-wrap::-webkit-scrollbar{display:none}
.cat-pill{
  flex-shrink:0;
  border:1px solid rgba(255,255,255,0.1);
  color:var(--stone);
  background:none;
  border-radius:24px;
  padding:7px 18px;
  font-size:13px;font-weight:500;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:all 0.22s ease;
  white-space:nowrap;
}
.cat-pill:hover{color:var(--gold);border-color:var(--border);}
.cat-pill.active{
  background:var(--gold);
  color:var(--obsidian);
  border-color:var(--gold);
  font-weight:600;
}
.search-zone{
  background:#fff;
  padding:12px 20px;
  border-bottom:1px solid #EDE9E1;
}
.search-inner{position:relative;}
.search-inner svg{
  position:absolute;left:14px;top:50%;
  transform:translateY(-50%);
  opacity:0.4;pointer-events:none;
}
.search-input{
  width:100%;
  padding:11px 16px 11px 44px;
  border:1.5px solid #E8E4DA;
  border-radius:12px;
  font-size:14px;font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--obsidian);outline:none;
  transition:border-color 0.2s;
}
.search-input:focus{border-color:var(--gold);}
.section-label{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:600;
  color:var(--obsidian);
  padding:28px 20px 12px;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{
  content:'';flex:1;
  height:1px;background:linear-gradient(to right,#D4CFC6,transparent);
}
.section-label-icon{font-size:20px;}
.menu-section{padding:0 16px;}
.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:12px;
  padding-bottom:8px;
}
.menu-card{
  background:#fff;
  border-radius:var(--radius);
  border:1px solid #EDE9E1;
  overflow:hidden;
  display:flex;
  transition:transform 0.18s ease, box-shadow 0.18s ease;
  position:relative;
}
.menu-card:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 28px rgba(0,0,0,0.09);
}
.card-emoji-wrap{
  width:100px;min-height:100px;
  flex-shrink:0;
  background:linear-gradient(135deg,#FDF6EC,#F5EDD8);
  display:flex;align-items:center;justify-content:center;
  font-size:42px;
  overflow:hidden;
}
.card-emoji-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.card-body{
  flex:1;padding:14px 14px 12px;
  display:flex;flex-direction:column;
}
.card-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;}
.food-dot{
  width:12px;height:12px;border-radius:3px;
  border:1.5px solid;flex-shrink:0;margin-top:3px;
  display:flex;align-items:center;justify-content:center;
}
.food-dot.veg{border-color:var(--green);}
.food-dot.veg::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:block;}
.food-dot.nonveg{border-color:var(--red);}
.food-dot.nonveg::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--red);display:block;}
.card-name{
  font-size:15px;font-weight:600;
  color:var(--obsidian);
  line-height:1.3;
}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
.badge{
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:4px;
  letter-spacing:0.4px;text-transform:uppercase;
}
.badge-hot{background:#FEF3E2;color:#B7600A;}
.badge-new{background:var(--green-bg);color:var(--green);}
.spice{display:flex;gap:2px;margin-bottom:5px;}
.spice-dot{
  width:8px;height:8px;border-radius:50%;
  background:#EDE9E1;
}
.spice-dot.on{background:#E74C3C;}
.card-desc{
  font-size:12px;color:var(--stone);
  line-height:1.5;
  flex:1;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.card-footer{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-top:10px;
}
.card-price{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:700;
  color:var(--obsidian);
}
.card-price span{font-size:13px;font-weight:400;font-family:'DM Sans',sans-serif;}
.add-wrap{display:flex;align-items:center;gap:0;}
.add-single{
  background:var(--obsidian);
  color:#fff;border:none;
  border-radius:8px;
  padding:7px 18px;
  font-size:13px;font-weight:600;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:background 0.18s;
}
.add-single:hover{background:#333;}
.qty-ctrl{
  display:flex;align-items:center;
  background:var(--obsidian);
  border-radius:8px;overflow:hidden;
}
.qty-btn{
  background:none;border:none;
  color:#fff;width:32px;height:32px;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-weight:300;
  transition:background 0.15s;
}
.qty-btn:hover{background:rgba(255,255,255,0.1);}
.qty-num{
  color:var(--gold);
  font-size:14px;font-weight:600;
  min-width:24px;text-align:center;
}
.ribbon{
  position:absolute;top:10px;right:0;
  background:var(--gold);
  color:var(--obsidian);
  font-size:9px;font-weight:700;
  padding:3px 10px 3px 8px;
  letter-spacing:0.5px;
  border-radius:3px 0 0 3px;
}
.cart-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:12px 20px max(12px, env(safe-area-inset-bottom));
  background:rgba(13,13,13,0.95);
  backdrop-filter:blur(12px);
  z-index:200;
  display:none;
  border-top:1px solid rgba(201,168,76,0.2);
}
.cart-bar.show{display:block;}
.cart-btn{
  width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:var(--obsidian);
  border:none;border-radius:14px;
  padding:16px 22px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;
  cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 4px 20px rgba(201,168,76,0.35);
  transition:transform 0.15s, box-shadow 0.15s;
}
.cart-btn:active{transform:scale(0.98);}
.cart-btn-left{display:flex;align-items:center;gap:10px;}
.cart-badge{
  background:rgba(0,0,0,0.18);
  border-radius:8px;padding:3px 10px;
  font-size:13px;
}
.cart-total-label{font-size:15px;font-weight:700;}
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:300;opacity:0;pointer-events:none;
  transition:opacity 0.25s;
  backdrop-filter:blur(4px);
}
.overlay.open{opacity:1;pointer-events:all;}
.drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;
  border-radius:24px 24px 0 0;
  max-height:90vh;
  overflow-y:auto;
  z-index:400;
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);
}
.overlay.open .drawer{transform:translateY(0);}
.drawer-handle{
  width:40px;height:4px;border-radius:2px;
  background:#E0DDD6;
  margin:12px auto 0;
}
.drawer-head{
  padding:16px 22px 14px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #F0ECE4;
  position:sticky;top:0;background:#fff;z-index:5;
}
.drawer-title{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;
}
.close-x{
  background:#F5F2EC;border:none;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;cursor:pointer;
  color:var(--stone);
  display:flex;align-items:center;justify-content:center;
}
.cart-items{padding:0 22px;}
.cart-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 0;border-bottom:1px solid #F5F2EC;
}
.ci-emoji{font-size:26px;width:36px;text-align:center;}
.ci-name{flex:1;font-size:14px;font-weight:500;}
.ci-price{font-size:14px;font-weight:600;white-space:nowrap;}
.ci-qty-ctrl{
  display:flex;align-items:center;
  border:1.5px solid #E8E4DA;
  border-radius:8px;overflow:hidden;
}
.ci-btn{
  background:none;border:none;
  width:28px;height:28px;cursor:pointer;
  font-size:16px;color:var(--stone);
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.ci-btn:hover{background:var(--cream);}
.ci-num{font-size:13px;font-weight:600;min-width:20px;text-align:center;}
.bill-box{
  margin:16px 22px;
  background:var(--cream);
  border-radius:14px;
  padding:16px 18px;
  border:1px solid #EDE9E1;
}
.bill-row{
  display:flex;justify-content:space-between;
  font-size:13px;color:var(--stone);padding:4px 0;
}
.bill-total{
  font-size:16px;font-weight:700;
  color:var(--obsidian);
  border-top:1px solid #E8E4DA;
  padding-top:10px;margin-top:8px;
}
.note-area{margin:0 22px 16px;}
.note-area label{font-size:12px;color:var(--stone);display:block;margin-bottom:6px;}
.note-area textarea{
  width:100%;padding:10px 14px;
  border:1.5px solid #E8E4DA;border-radius:10px;
  font-size:13px;font-family:'DM Sans',sans-serif;
  background:var(--cream);color:var(--obsidian);
  outline:none;resize:none;
  transition:border-color 0.2s;
}
.note-area textarea:focus{border-color:var(--gold);}
.place-btn{
  margin:0 22px 28px;width:calc(100% - 44px);
  background:linear-gradient(135deg,var(--obsidian),#2a2a2a);
  color:#fff;border:none;
  border-radius:14px;padding:16px;
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:600;
  cursor:pointer;
  letter-spacing:0.3px;
  transition:opacity 0.2s;
}
.place-btn:hover{opacity:0.88;}
.empty-cart{text-align:center;padding:40px 20px;color:var(--stone);}
.empty-cart-icon{font-size:48px;margin-bottom:12px;}
.success-screen{
  text-align:center;padding:48px 24px;
  display:none;
}
.success-screen.show{display:block;}
.success-ring{
  width:80px;height:80px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold-glow),rgba(201,168,76,0.3));
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  margin:0 auto 20px;
  animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{
  font-family:'Playfair Display',serif;
  font-size:24px;font-weight:700;margin-bottom:8px;
}
.success-sub{font-size:14px;color:var(--stone);line-height:1.6;}
.order-pill{
  display:inline-block;
  background:var(--gold-glow);
  border:1px solid var(--border);
  color:var(--gold);
  padding:10px 24px;border-radius:24px;
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:700;
  margin:18px auto;
  letter-spacing:1px;
}
.back-btn{
  background:var(--obsidian);color:#fff;
  border:none;border-radius:12px;
  padding:13px 32px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;
  cursor:pointer;margin-top:20px;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-main">
    <div class="brand">
      <div class="brand-name">Spice Garden</div>
      <div class="brand-tagline">Fine Indian Cuisine</div>
    </div>
    <div class="table-chip">Table {{ table_number }}</div>
  </div>
  <div class="cat-scroll-wrap" id="catScroll">
    <button class="cat-pill active" data-cat="all" onclick="filterCat('all',this)">✦ All</button>
  </div>
</header>

<div class="search-zone">
  <div class="search-inner">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search dishes, ingredients…" oninput="renderMenu()">
  </div>
</div>

<div id="menuContainer"></div>

<div class="cart-bar" id="cartBar">
  <button class="cart-btn" onclick="openDrawer()">
    <div class="cart-btn-left">
      <span>🛒</span>
      <span class="cart-badge" id="cartCount">0 items</span>
      <span>View Order</span>
    </div>
    <span class="cart-total-label" id="cartTotal">₹0</span>
  </button>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-handle"></div>
    <div class="drawer-head">
      <div class="drawer-title">Your Order</div>
      <button class="close-x" onclick="closeDrawer()">✕</button>
    </div>
    <div id="drawerBody"></div>
    <div class="success-screen" id="successScreen">
      <div class="success-ring">✓</div>
      <div class="success-title">Order Placed!</div>
      <div class="success-sub">Your order is confirmed and being prepared.<br>Sit back and relax.</div>
      <div class="order-pill" id="successOrderId"></div>
      <div class="success-sub">Estimated time: <strong>20–25 minutes</strong></div>
      <button class="back-btn" onclick="closeDrawer()">Continue Browsing</button>
    </div>
  </div>
</div>

<script>
const TABLE_NUMBER = {{ table_number }};
let menuData = [];
let cart = {};
let activeCat = 'all';

fetch('/api/menu/')
  .then(r => r.json())
  .then(data => {
    menuData = data.categories;
    buildCatPills();
    renderMenu();
  });

function buildCatPills() {
  const scroll = document.getElementById('catScroll');
  menuData.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill';
    btn.dataset.cat = cat.slug;
    btn.textContent = cat.icon + ' ' + cat.name;
    btn.onclick = () => filterCat(cat.slug, btn);
    scroll.appendChild(btn);
  });
}

function filterCat(cat, el) {
  activeCat = cat;
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const container = document.getElementById('menuContainer');
  let html = '';
  let totalShown = 0;
  for (const cat of menuData) {
    if (activeCat !== 'all' && cat.slug !== activeCat) continue;
    const items = cat.items.filter(i =>
      !q || i.name.toLowerCase().includes(q) || i.description.toLowerCase().includes(q)
    );
    if (!items.length) continue;
    totalShown += items.length;
    html += `<div class="section-label"><span class="section-label-icon">${cat.icon}</span>${cat.name}</div>`;
    html += `<div class="menu-section"><div class="menu-grid">`;
    items.forEach(item => { html += cardHTML(item); });
    html += `</div></div>`;
  }
  if (!totalShown) {
    html = `<div style="text-align:center;padding:60px 20px;color:var(--stone);font-size:15px">No dishes found</div>`;
  }
  container.innerHTML = html;
}

function cardHTML(item) {
  const qty = cart[item.id] || 0;
  const spice = [0,1,2,3].map(i =>
    `<div class="spice-dot${i < item.spice_level ? ' on':''}"></div>`
  ).join('');
  const ctrl = qty > 0
    ? `<div class="qty-ctrl">
        <button class="qty-btn" onclick="chQty(${item.id},-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="chQty(${item.id},1)">+</button>
       </div>`
    : `<button class="add-single" onclick="chQty(${item.id},1)">Add</button>`;
  const ribbon = item.is_bestseller ? `<div class="ribbon">★ BEST</div>` : '';
  const badges = [
    item.is_bestseller ? `<span class="badge badge-hot">🔥 Bestseller</span>` : '',
    item.is_new ? `<span class="badge badge-new">✦ New</span>` : '',
  ].filter(Boolean).join('');

  const mediaHTML = item.image
    ? `<img src="${item.image}" alt="${item.name}">`
    : item.emoji;

  return `
  <div class="menu-card" id="mc${item.id}">
    ${ribbon}
    <div class="card-emoji-wrap">${mediaHTML}</div>
    <div class="card-body">
      <div class="card-top">
        <div class="food-dot ${item.food_type}"></div>
        <div class="card-name">${item.name}</div>
      </div>
      ${badges ? `<div class="card-badges">${badges}</div>` : ''}
      ${item.spice_level > 0 ? `<div class="spice">${spice}</div>` : ''}
      <div class="card-desc">${item.description}</div>
      <div class="card-footer">
        <div class="card-price"><span>₹</span>${item.price}</div>
        <div class="add-wrap">${ctrl}</div>
      </div>
    </div>
  </div>`;
}

function chQty(id, delta) {
  const cur = cart[id] || 0;
  const next = cur + delta;
  if (next <= 0) delete cart[id]; else cart[id] = next;
  renderMenu();
  updateBar();
}

function updateBar() {
  const totalQty = Object.values(cart).reduce((a,b)=>a+b,0);
  const totalAmt = cartTotal();
  const bar = document.getElementById('cartBar');
  if (totalQty > 0) {
    bar.classList.add('show');
    document.getElementById('cartCount').textContent = `${totalQty} item${totalQty>1?'s':''}`;
    document.getElementById('cartTotal').textContent = `₹${totalAmt}`;
  } else {
    bar.classList.remove('show');
  }
}

function cartTotal() {
  return Object.entries(cart).reduce((sum,[id,qty])=>{
    for(const cat of menuData) for(const i of cat.items) if(i.id==id) return sum+i.price*qty;
    return sum;
  },0);
}

function getItemById(id) {
  for(const cat of menuData) for(const i of cat.items) if(i.id==id) return i;
  return null;
}

function openDrawer() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('successScreen').classList.remove('show');
  renderDrawer();
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('successScreen').classList.remove('show');
}

function renderDrawer() {
  const entries = Object.entries(cart);
  const body = document.getElementById('drawerBody');
  if (!entries.length) {
    body.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛒</div><div>Your cart is empty</div></div>`;
    return;
  }
  const sub = cartTotal();
  const gst = Math.round(sub * 5) / 100;
  const total = sub + gst;
  const rows = entries.map(([id,qty])=>{
    const item = getItemById(id);
    if(!item) return '';
    const thumbHTML = item.image
      ? `<img src="${item.image}" style="width:36px;height:36px;border-radius:8px;object-fit:cover;">`
      : `<div class="ci-emoji">${item.emoji}</div>`;
    return `<div class="cart-row">
      ${thumbHTML}
      <div class="ci-name">${item.name}</div>
      <div class="ci-qty-ctrl">
        <button class="ci-btn" onclick="ciQty(${id},-1)">−</button>
        <span class="ci-num">${qty}</span>
        <button class="ci-btn" onclick="ciQty(${id},1)">+</button>
      </div>
      <div class="ci-price">₹${item.price*qty}</div>
    </div>`;
  }).join('');
  body.innerHTML = `
    <div class="cart-items">${rows}</div>
    <div class="bill-box">
      <div class="bill-row"><span>Subtotal</span><span>₹${sub}</span></div>
      <div class="bill-row"><span>GST (5%)</span><span>₹${gst.toFixed(2)}</span></div>
      <div class="bill-row bill-total"><span>Total</span><span>₹${total.toFixed(2)}</span></div>
    </div>
    <div class="note-area">
      <label>Special instructions</label>
      <textarea id="orderNote" rows="2" placeholder="Less spicy, no onion, extra sauce…"></textarea>
    </div>
    <button class="place-btn" onclick="placeOrder(${total.toFixed(2)})">Place Order — ₹${total.toFixed(2)}</button>
  `;
}

function ciQty(id, delta) {
  chQty(id, delta);
  renderDrawer();
}

function placeOrder(total) {
  const items = Object.entries(cart).map(([id,qty])=>({id:parseInt(id),quantity:qty}));
  const note = document.getElementById('orderNote')?.value || '';
  fetch('/api/orders/place/', {
    method:'POST',
    headers:{'Content-Type':'application/json','X-CSRFToken': getCookie('csrftoken')},
    body: JSON.stringify({table_number:TABLE_NUMBER, items, special_instructions:note})
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.success){
      cart={};
      updateBar();
      document.getElementById('drawerBody').innerHTML='';
      document.getElementById('successOrderId').textContent = '#' + data.order_id;
      document.getElementById('successScreen').classList.add('show');
    } else {
      alert('Error: ' + (data.error||'Unknown error'));
    }
  })
  .catch(()=>alert('Network error. Please try again.'));
}

function getCookie(name) {
  const v = document.cookie.match('(^|;) ?'+name+'=([^;]*)(;|$)');
  return v ? v[2] : null;
}
</script>
</body>
</html>
